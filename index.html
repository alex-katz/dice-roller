<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Custom Dice Roller</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <aside class="sidebar" id="sidebar">
            <button id="mobile-toggle-btn">☰</button>
            <div id="controls-container"></div>
            
            <!-- New difficulty controls -->
            <div class="difficulty-control" id="difficulty-control">
                <div class="diff-buttons">
                    <button class="diff-btn active" data-op="none">None</button>
                    <button class="diff-btn" data-op=">=">More</button>
                    <button class="diff-btn" data-op="<=">Less</button>
                </div>
                <div class="diff-slider-container">
                    <span id="diff-val-display">10</span>
                    <input type="range" id="diff-target" min="1" max="100" value="10">
                </div>
            </div>

            <button id="roll-btn">Roll</button>
        </aside>
        
        <main class="main-content">
            <div id="dice-board"></div>
        </main>
    </div>

    <script src="dice_config.js"></script>
    <script src="app.js"></script>
</body>
</html>
